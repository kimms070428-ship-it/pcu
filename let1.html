<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정수 5개 입력받아 역순 출력</title>
</head>
<body>
    <h3>정수 5개 입력받아 역순으로 출력</h3>
    <hr>
    <script>
        let numbers = [];

        // 1. prompt()를 반복 호출하여 5개의 정수 입력받기
        for (let i = 0; i < 5; i++) {
            let input = prompt("정수 입력");
            numbers.push(parseInt(input)); // 입력받은 문자열을 숫자로 변환하여 배열에 저장
        }

        // 2. 입력된 수의 배열 출력
        document.write("입력된 수의 배열<br>");
        for (let i = 0; i < numbers.length; i++) {
            document.write(numbers[i] + " ");
        }

        document.write("<br><hr>");

        // 3. 역순으로 재정렬된 배열 출력
        document.write("역순으로 재정렬된 배열<br>");
        numbers.reverse(); // 배열의 순서를 뒤집음
        for (let i = 0; i < numbers.length; i++) {
            document.write(numbers[i] + " ");
        }
    </script>
</body>
</html>
